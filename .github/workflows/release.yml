name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true