# Real Postgres/Kafka/Redis for integration tests — this project tests
# against real infrastructure, not mocks (see CLAUDE.md). Mirrors the
# service containers configured in .github/workflows/ci.yml.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d --wait
#   export TEST_POSTGRES_DSN="postgresql://gokit:gokit@localhost:5432/gokit_test"
#   export TEST_REDIS_DSN="redis://localhost:6379/0"
#   export TEST_KAFKA_BROKERS="localhost:9092"
#   go test -race ./...
#   docker compose -f docker-compose.test.yml down -v
#
# Or via justfile: just test-infra-up / just test-integration / just test-infra-down

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: gokit
      POSTGRES_PASSWORD: gokit
      POSTGRES_DB: gokit_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gokit"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 15
